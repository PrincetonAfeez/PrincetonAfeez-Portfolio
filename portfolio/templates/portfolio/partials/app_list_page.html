{% for app in apps %}
    {% include "portfolio/partials/app_card.html" with app=app %}
{% empty %}
    <p class="rounded border border-[var(--color-line)] bg-white p-6 text-[var(--color-muted)]">
        No apps are available yet.
    </p>
{% endfor %}
{% if has_next %}
    <noscript>
        <p class="mt-4">
            <a class="button-secondary" href="?page={{ next_page }}">Load more</a>
        </p>
    </noscript>
    <div hx-get="{% url 'portfolio:app_list' %}?page={{ next_page }}"
         hx-trigger="revealed"
         hx-swap="outerHTML"
         class="h-12"
         aria-hidden="true"></div>
{% endif %}
