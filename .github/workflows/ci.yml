name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      DJANGO_SETTINGS_MODULE: core.settings.test
      SECRET_KEY: ci-not-for-production-use-only
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt

      - name: Install Node dependencies and build CSS
        run: npm ci && npm run build:css

      - name: Install Python dependencies
        run: pip install --disable-pip-version-check -r requirements/dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check format with black
        run: black --check .

      - name: Lint templates with djlint
        run: djlint pages/templates portfolio/templates --check

      - name: Install Playwright browser (Chromium)
        run: python -m playwright install chromium --with-deps

      - name: Run migrations
        run: python manage.py migrate

      - name: Run seed command
        run: python manage.py seed_apps

      - name: Run tests with coverage
        env:
          DJANGO_ALLOW_ASYNC_UNSAFE: "true"
        run: >-
          pytest
          --cov=core
          --cov=pages
          --cov=portfolio
          --cov-report=term-missing
          --cov-fail-under=70
