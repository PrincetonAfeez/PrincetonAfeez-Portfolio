<section id="contact" class="section-band bg-[var(--color-soft)]">
    <div class="section-inner">
        <div class="max-w-3xl">
            <p class="section-kicker">Contact</p>
            <h2 class="section-title">Direct lines, no form.</h2>
        </div>
        <div class="mt-8 grid gap-4 md:grid-cols-3">
            <a class="contact-row" href="mailto:{{ CONTACT_EMAIL }}">
                <i data-lucide="mail" aria-hidden="true"></i>
                <span>Email</span>
            </a>
            <a class="contact-row" href="{{ LINKEDIN_URL }}">
                <i data-lucide="linkedin" aria-hidden="true"></i>
                <span>LinkedIn</span>
            </a>
            <a class="contact-row" href="{{ GITHUB_URL }}">
                <i data-lucide="github" aria-hidden="true"></i>
                <span>GitHub</span>
            </a>
        </div>
    </div>
</section>
