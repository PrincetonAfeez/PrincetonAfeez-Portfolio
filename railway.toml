[build]
builder = "NIXPACKS"
# Compile assets and static files only — no database required during the image build.
buildCommand = "npm ci && npm run build:css && pip install -r requirements/prod.txt && python manage.py collectstatic --noinput"

[deploy]
# Runs after build, against Railway Postgres, before new containers start serving traffic.
preDeployCommand = "python manage.py migrate && python manage.py seed_apps"
startCommand = "gunicorn core.wsgi:application --workers 2 --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
