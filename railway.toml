[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build:css && pip install -r requirements/prod.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_apps"

[deploy]
startCommand = "gunicorn core.wsgi:application --workers 2 --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
